services:
  ctp:
    build: .
    env_file:
      - .env.production
    network_mode: host
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/api/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file:
      - .env.cloudflared
    command: tunnel --no-autoupdate run
    network_mode: host
    restart: unless-stopped
